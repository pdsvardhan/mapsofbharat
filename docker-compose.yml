services:
  app:
    build: .
    container_name: mapsofbharat
    restart: unless-stopped
    ports:
      - "127.0.0.1:8610:3000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - projects-net

networks:
  projects-net:
    external: true
