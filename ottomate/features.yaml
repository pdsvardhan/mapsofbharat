features:
  - id: feat-geo-backbone
    title: Geography backbone and region crosswalk
    short_description: "The hard part: a crosswalk reconciling Census-2011 districts
      with today's boundaries, so old data renders correctly on the current,
      Survey-of-India-compliant map."
    type: backend
    status: done
    priority: P0
    size: L
    test_status: partial
    notes: "Current-day crosswalk implemented + validated 2026-06-09 (see ADR
      adr-010-subdistrict-crosswalk). Sub-district reaggregation: SHRUG pc11
      sub-district polygons (WGS84) -> representative_point -> point-in-polygon
      within current districts -> sum raw PCA counts -> recompute rates. Keyed
      by unique rid = st_code_dtcode everywhere (geojson property, DB
      region_code, MapLibre promoteId); this fixed 36 duplicate dt_code
      collisions between re-cut Andhra Pradesh and Maharashtra (e.g. code 519 =
      Srikakulam + Mumbai). Validation vs official 2011 district PCA: median
      diff 0.00 pct, 489/594 within 2 pct. Wrote 8760 values across 730
      districts; total pop 1.19B (1.6 pct under census). Pipeline:
      pipeline/add_rid.py + pipeline/reaggregate.py."
    acceptance_criteria:
      - content: A Census-2011 sub-district to current-district crosswalk (rid-keyed)
          reaggregates 2011 data onto current boundaries, validated against
          official PCA (median diff < 2%)
        test_status: not-tested
        linked_test: null
      - content: Every state and district polygon resolves to one canonical region_id
        test_status: not-tested
        linked_test: null
      - content: Boundary set passes a Survey-of-India compliance check (J&K, Ladakh,
          Arunachal, Aksai Chin)
        test_status: not-tested
        linked_test: null
    dependencies: []
