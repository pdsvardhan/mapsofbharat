slug: mapsofbharat
display_name: MapsOfBharat
summary:
  tagline: Map-first statistics & data visualization for India
  short_description: "An interactive map of India for official statistics:
    choropleths that drill from state to district, with compare mode
    (region/year/metric), rankings, and one-click export. Every metric is
    sourced from government or top-tier institutions, harmonized to a canonical
    region key, and fully cited."
  core_idea: MapsOfBharat is a map-first data-visualization platform for India. A
    user picks an official statistic (literacy, population density, crime rate,
    voter turnout, and more) and sees it as an interactive choropleth that
    drills India -> state -> district, with linked charts, rankings, and
    side-by-side comparison across regions, years, or metrics. Every series
    comes from an official government or top-tier source, is harmonized to a
    canonical region key via an LGD/Census-2011 crosswalk, rendered on the
    current-day map, and is fully cited and downloadable. Clarity-first for the
    public; depth (compare, time-series, export, embed) for journalists,
    researchers, and analysts.
