    risk_type_id: data-drift-undetected
    status: resolved
    resolved_at: 2026-06-10T01:46:21.000Z
    resolution_summary: validate_drift.py re-checks live DB vs
      pipeline/expectations.json (2% tolerance) on a schedule;
      scripts/validate-and-notify.sh posts to /api/log on drift. Pipeline
      reaggregate still refuses to write on >2% median diff.
    hidden_by_default: true
    severity_override: critical
    notes: Govt source schemas, district boundaries (2011 to current), and report
      formats (e.g. NCRB PDF layouts) change over time; ingestion must detect
      drift via row-count, schema, and crosswalk-coverage checks. Also covers
      census-2011 vintage and constituency-boundary changes.
    created_at: 2026-06-08T14:16:11.000Z
