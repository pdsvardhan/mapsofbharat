    tags:
      - data
      - trust
      - curated
      - cat:product
    body_path: decisions/adr-005-official-sources-only.md
  - id: adr-006-vertical-slice
    project_slug: mapsofbharat
    title: Ship one vertical (Demographics) end-to-end first, on a generic engine
      plus adapters
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - process
      - architecture
      - curated
      - cat:product
    body_path: decisions/adr-006-vertical-slice.md
  - id: adr-007-tech-stack
    project_slug: mapsofbharat
    title: "Tech stack: Next.js (App Router) + TypeScript; Tailwind v4 + shadcn/ui;
      MapLibre GL JS for the choropleth (WebGL vector tiles for smooth India to
      state to district zoom at 780+ districts, reused from desi-skies);
      Recharts + d3-scale-chromatic for charts and colour scales; better-sqlite3
      + drizzle canonical store; Python (pandas + pdfplumber/camelot) ingestion
      pipeline."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - tech
      - architecture
      - curated
    body_path: decisions/adr-007-tech-stack.md
  - id: adr-008-component-strategy
    project_slug: mapsofbharat
    title: "Component strategy: core viz components (choropleth, legend,
      colour-scale control, compare pane, region detail) are built custom on
      MapLibre/D3; generic primitives come from shadcn/ui. The master_components
      catalog is empty and intentionally not used for this bespoke-viz project."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - ui
      - components
      - architecture
      - curated
    body_path: decisions/adr-008-component-strategy.md
  - id: adr-009-build-plan
    project_slug: mapsofbharat
    title: "Build plan v1 (topological): geo-backbone -> canonical-store ->
      ingest-pipeline (+ demographics adapter) -> demographics-pilot data load
      -> choropleth-map + metric-selector + source-trust -> rankings-stats +
      region-detail -> compare-mode + export-share -> find-my-district."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - process
      - build-plan
      - curated
    body_path: decisions/adr-009-build-plan.md
