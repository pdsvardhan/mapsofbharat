decisions:
  - id: adr-001-mapsofbharat-staging
    project_slug: mapsofbharat
    title: Initial Stage 1 staging for MapsOfBharat
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - staging
      - initial
    body_path: decisions/adr-001-mapsofbharat-staging.md
  - id: adr-002-geography-backbone
    project_slug: mapsofbharat
    title: "Geography backbone: DataMeet/SHRUG 2011 districts plus Survey of India
      outline; dual key LGD and Census-2011"
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - geo
      - data
      - legal
    body_path: decisions/adr-002-geography-backbone.md
  - id: adr-003-current-day-rendering
    project_slug: mapsofbharat
    title: Store finest-unit data and render to current-day boundaries via
      crosswalk; keep an as-reported-2011 toggle
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - geo
      - data
    body_path: decisions/adr-003-current-day-rendering.md
  - id: adr-004-own-canonical-store
    project_slug: mapsofbharat
    title: Own canonical DB with scheduled ETL; no live source calls at request
      time; MoSPI MCP for dev exploration only
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - data
      - architecture
    body_path: decisions/adr-004-own-canonical-store.md
  - id: adr-005-official-sources-only
    project_slug: mapsofbharat
    title: "Provenance rule: official/government or top-tier sources only; cite
      every metric"
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - data
      - trust
    body_path: decisions/adr-005-official-sources-only.md
  - id: adr-006-vertical-slice
    project_slug: mapsofbharat
    title: Build the Demographics vertical end-to-end first on a generic engine plus
      adapter pattern
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - process
      - architecture
    body_path: decisions/adr-006-vertical-slice.md
  - id: adr-007-tech-stack
    project_slug: mapsofbharat
    title: "Tech stack: Next.js (App Router) + TypeScript; Tailwind v4 + shadcn/ui;
      MapLibre GL JS for the choropleth (WebGL vector tiles for smooth India to
      state to district zoom at 780+ districts, reused from desi-skies);
      Recharts + d3-scale-chromatic for charts and colour scales; better-sqlite3
      + drizzle canonical store; Python (pandas + pdfplumber/camelot) ingestion
      pipeline."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - tech
      - architecture
    body_path: decisions/adr-007-tech-stack.md
  - id: adr-008-component-strategy
    project_slug: mapsofbharat
    title: "Component strategy: core viz components (choropleth, legend,
      colour-scale control, compare pane, region detail) are built custom on
      MapLibre/D3; generic primitives come from shadcn/ui. The master_components
      catalog is empty and intentionally not used for this bespoke-viz project."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - ui
      - components
      - architecture
    body_path: decisions/adr-008-component-strategy.md
  - id: adr-009-build-plan
    project_slug: mapsofbharat
    title: "Build plan v1 (topological): geo-backbone -> canonical-store ->
      ingest-pipeline (+ demographics adapter) -> demographics-pilot data load
      -> choropleth-map + metric-selector + source-trust -> rankings-stats +
      region-detail -> compare-mode + export-share -> find-my-district."
    status: accepted
    date: 2026-06-08T00:00:00.000Z
    tags:
      - process
      - build-plan
    body_path: decisions/adr-009-build-plan.md
  - id: adr-010-subdistrict-crosswalk
    project_slug: mapsofbharat
    title: Reaggregate 2011 sub-district counts into current-day districts
    status: accepted
    date: 2026-06-09T00:00:00.000Z
    tags:
      - data
      - architecture
    body_path: decisions/2026-06-09-reaggregate-subdistrict-crosswalk.md
  - id: adr-011-stage3-ac-rescope
    project_slug: mapsofbharat
    title: Re-scope Stage 1 acceptance criteria to shipped Stage 3 reality; move
      gaps to backlog
    status: accepted
    date: 2026-06-10T00:00:00.000Z
    tags:
      - process
      - scope
    body_path: decisions/2026-06-10-stage3-ac-rescope.md
