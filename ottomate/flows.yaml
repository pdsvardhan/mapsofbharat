flows:
  - id: flow-explore-metric
    title: Explore a metric on the map
    type: ui
    priority: critical
    test_status: passing
    trigger: User opens a metric view
    expected_outcome: User sees the spatial distribution and a chosen region standing
    pre_conditions: []
    steps:
      - actor: user
        action: Selects a metric and year
        result: Map request issued
      - actor: system
        action: Renders the state-level choropleth with legend
        result: Spatial distribution visible
      - actor: user
        action: Hovers or clicks a region
        result: Region focused
      - actor: system
        action: Shows tooltip/panel with value, rank, and percentile
        result: User sees the region standing
    edge_cases: []
    linked_features: []
    linked_pages: []
  - id: flow-drill-state
    title: Drill into a state to district level
    type: ui
    priority: critical
    test_status: passing
    trigger: User selects a state, then clicks View N districts in its profile
    expected_outcome: District-level detail for the chosen state
    notes: "Interaction model changed at iter-51 (adr-015): state click now SELECTS
      (docked profile); drilling happens via the profile drill button. Steps
      updated 2026-07-02."
    pre_conditions: []
    steps:
      - actor: user
        action: Clicks a state (map or ranking rail)
        result: State selected - docked profile with View N districts button
      - actor: user
        action: Clicks View N districts in the profile
        result: Drill requested
      - actor: system
        action: Zooms to the state, filters districts, recolours on a local scale
        result: District choropleth for that state with local legend
      - actor: user
        action: Clicks India in the breadcrumb
        result: Back requested
      - actor: system
        action: Zooms back to the India view
        result: National view restored
    edge_cases: []
    linked_features: []
    linked_pages: []
  - id: flow-compare
    title: Compare two regions, years, or metrics
    type: ui
    priority: important
    test_status: passing
    trigger: User opens compare mode
    expected_outcome: Side-by-side comparison with optional difference
    pre_conditions: []
    steps:
      - actor: user
        action: Selects comparison type and A and B
        result: Selections set
      - actor: system
        action: Pins the two selected regions and renders their values side by side in a
          compare panel
        result: Comparison visible
      - actor: user
        action: Reviews the per-region values and bars
        result: Both regions' standing visible
      - actor: system
        action: Shows the A-minus-B difference between the two regions
        result: Difference visible
    edge_cases: []
    linked_features: []
    linked_pages: []
  - id: flow-export-share
    title: Export or share the current view
    type: ui
    priority: important
    test_status: passing
    trigger: User clicks export or share
    expected_outcome: A downloadable file or shareable link
    pre_conditions: []
    steps:
      - actor: user
        action: Chooses a format or share option
        result: Request issued
      - actor: system
        action: Generates CSV/PNG/SVG or a permalink and iframe snippet
        result: Artifact produced
      - actor: user
        action: Downloads or copies it
        result: User has the artifact
    edge_cases: []
    linked_features: []
    linked_pages: []
  - id: flow-ingest-dataset
    title: Ingest or refresh a dataset
    type: automated
    priority: important
    test_status: passing
    trigger: Scheduled job or manual run
    expected_outcome: Fresh, cited data available to the UI
    pre_conditions: []
    steps:
      - actor: system
        action: Runs the dataset adapter to fetch the source
        result: Raw source pulled
      - actor: system
        action: Cleans, maps to LGD, and normalizes
        result: Canonical rows prepared
      - actor: system
        action: Upserts into the store and records provenance
        result: Data and provenance persisted
      - actor: system
        action: Runs drift checks (row counts, schema, crosswalk coverage)
        result: Drift flagged or cleared
    edge_cases: []
    linked_features: []
    linked_pages: []
