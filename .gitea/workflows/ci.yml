name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install native build toolchain (better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Lint (advisory)
        # The map component leans on MapLibre's loosely-typed expression API, so
        # lint is informational; typecheck + build below are the hard gates.
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  pipeline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Pipeline integrity tests
        # The DB is gitignored; tests self-skip when it's absent, so this job
        # validates structure wherever the data volume is present.
        run: pytest -q pipeline/test_pipeline.py
